<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="100%" height="100%">
  <!-- Header / Profile area background -->
  <rect width="400" height="550" fill="#F4F5F7" />
  
  <!-- Back arrow -->
  <path d="M25,30 L15,40 L25,50" stroke="#333" stroke-width="2" fill="none" />
  
  <!-- Avatar -->
  <circle cx="200" cy="110" r="45" fill="#E2E8F0" />
  <clipPath id="avatar-clip-6">
    <circle cx="200" cy="110" r="43" />
  </clipPath>
  <g clip-path="url(#avatar-clip-6)">
    <!-- Dog avatar representation -->
    <rect x="150" y="60" width="100" height="100" fill="#FFF9C4" />
    <circle cx="200" cy="115" r="25" fill="#FFB74D" />
    <circle cx="190" cy="110" r="3" fill="#333" />
    <circle cx="210" cy="110" r="3" fill="#333" />
    <ellipse cx="200" cy="120" rx="4" ry="3" fill="#D84315" />
  </g>
  <circle cx="200" cy="110" r="44" stroke="#E2E8F0" stroke-width="2" fill="none" />

  <!-- User Name -->
  <text x="200" y="185" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">也不是什么野人</text>
  
  <!-- Bio -->
  <text x="200" y="210" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" fill="#64748B" text-anchor="middle">无</text>
  
  <!-- Badges -->
  <!-- IP Badge -->
  <rect x="170" y="225" width="60" height="18" rx="4" fill="#F1F5F9" />
  <text x="200" y="238" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10" fill="#64748B" text-anchor="middle">IP: 江西</text>

  <!-- Button: 查看主页 -->
  <rect x="140" y="258" width="120" height="32" rx="16" fill="#E2E8F0" />
  <text x="200" y="278" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">查看主页</text>

  <!-- Warning Info Text -->
  <text x="200" y="325" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">
    <tspan x="200" dy="0">为保障用户沟通安全，未互相关注的陌生人违规消息可</tspan>
    <tspan x="200" dy="14">能会被处理，请遵守法律法规和社区规范</tspan>
  </text>

  <!-- Chat bubble representing user's query -->
  <circle cx="45" cy="405" r="16" fill="#FFB74D" />
  <rect x="75" y="365" width="280" height="100" rx="12" fill="#FFF" stroke="#E2E8F0" stroke-width="1" />
  <polygon points="75,395 68,400 75,405" fill="#FFF" stroke="#E2E8F0" stroke-width="1" />
  <polygon points="75,396 69,400 75,404" fill="#FFF" /> <!-- covers border -->

  <text x="88" y="386" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11" fill="#334155">
    <tspan x="88" dy="0">哥 方便问一下你吗 🥺 我在淘宝上看的</tspan>
    <tspan x="88" dy="16">vivo Y78t 就1000多点 但是拼多多上</tspan>
    <tspan x="88" dy="16">有820和924的 😭 能买吗这个价格的。</tspan>
    <tspan x="88" dy="16">我买来做备用机 插卡打电话开热点用</tspan>
    <tspan x="88" dy="32">没什么特别需求 方便的话哥能跟我说</tspan>
  </text>
</svg>
